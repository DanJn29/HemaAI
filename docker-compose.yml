services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      TEST_DB_NAME: ${TEST_DB_NAME:?TEST_DB_NAME must be set in .env}
    ports:
      - "${POSTGRES_HOST_PORT:?POSTGRES_HOST_PORT must be set in .env}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER must be set in .env} -d ${POSTGRES_DB:?POSTGRES_DB must be set in .env}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      TEST_DB_HOST: db
      TEST_DB_PORT: 5432
      TEST_DB_NAME: ${TEST_DB_NAME:?TEST_DB_NAME must be set in .env}
      TEST_DB_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      TEST_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
